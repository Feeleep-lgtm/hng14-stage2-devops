name: ci-cd

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  REGISTRY_HOST: localhost:5000
  IMAGE_NAMESPACE: hng14

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python with flake8
        run: flake8 api worker tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ESLint
        run: npm install --no-save eslint@9

      - name: Lint JavaScript with ESLint
        run: npx eslint frontend/app.js

      - name: Lint API Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < api/Dockerfile

      - name: Lint worker Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < worker/Dockerfile

      - name: Lint frontend Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run API unit tests with coverage
        run: pytest tests --cov=api --cov-report=xml:coverage.xml --cov-report=html:coverage-html

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-html

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/api:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/worker:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save built Docker images
        run: |
          mkdir -p image-artifacts
          docker pull "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:${GITHUB_SHA}"
          docker pull "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:${GITHUB_SHA}"
          docker pull "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:${GITHUB_SHA}"
          docker save -o image-artifacts/api.tar "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:${GITHUB_SHA}" "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:latest"
          docker save -o image-artifacts/worker.tar "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:${GITHUB_SHA}" "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:latest"
          docker save -o image-artifacts/frontend.tar "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:${GITHUB_SHA}" "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:latest"

      - name: Upload Docker image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: image-artifacts

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: image-artifacts

      - name: Load Docker images
        run: |
          docker load -i image-artifacts/api.tar
          docker load -i image-artifacts/worker.tar
          docker load -i image-artifacts/frontend.tar

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Scan API image with Trivy
        run: trivy image --severity CRITICAL --ignore-unfixed --format sarif --output trivy-api.sarif --exit-code 1 "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:${GITHUB_SHA}"

      - name: Scan worker image with Trivy
        run: trivy image --severity CRITICAL --ignore-unfixed --format sarif --output trivy-worker.sarif --exit-code 1 "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:${GITHUB_SHA}"

      - name: Scan frontend image with Trivy
        run: trivy image --severity CRITICAL --ignore-unfixed --format sarif --output trivy-frontend.sarif --exit-code 1 "${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:${GITHUB_SHA}"

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: image-artifacts

      - name: Load Docker images
        run: |
          docker load -i image-artifacts/api.tar
          docker load -i image-artifacts/worker.tar
          docker load -i image-artifacts/frontend.tar

      - name: Create CI environment file
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          cp .env.example .env.ci
          {
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo "API_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:${GITHUB_SHA}"
            echo "WORKER_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:${GITHUB_SHA}"
          } >> .env.ci

      - name: Start full stack with Docker Compose
        run: docker compose --env-file .env.ci up -d

      - name: Run integration test script
        env:
          FRONTEND_PORT: 5000
          INTEGRATION_TIMEOUT_SECONDS: 60
        run: cp .env.ci .env && bash scripts/integration.sh

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose --env-file .env.ci down -v --remove-orphans

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Docker image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: image-artifacts

      - name: Load Docker images
        run: |
          docker load -i image-artifacts/api.tar
          docker load -i image-artifacts/worker.tar
          docker load -i image-artifacts/frontend.tar

      - name: Create deploy environment file
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          cp .env.example .env.deploy
          {
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}"
            echo "API_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/api:${GITHUB_SHA}"
            echo "WORKER_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/worker:${GITHUB_SHA}"
            echo "FRONTEND_IMAGE=${REGISTRY_HOST}/${IMAGE_NAMESPACE}/frontend:${GITHUB_SHA}"
          } >> .env.deploy

      - name: Run rolling deployment
        run: cp .env.deploy .env && bash scripts/deploy.sh
